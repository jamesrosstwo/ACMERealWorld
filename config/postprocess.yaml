max_episode_timesteps: 250
episodes_path: "/home/james/ACME/data/mug_two"

realsense:
  n_frames: ${max_episode_timesteps}
  width: 1280
  height: 720
  fps: 15

writer:
  max_episode_len: ${max_episode_timesteps}
  instruction: "Pick up the green mug and place it into the sink"
  captures:
    frame_width: ${realsense.width}
    frame_height: ${realsense.height}
    max_episode_len: ${writer.max_episode_len}
    fps: ${realsense.fps}

stereo:
  enabled: true
  ckpt_dir: "./submodules/FoundationStereo/pretrained_models/23-51-11/model_best_bp2.pth"
  scale: 1.0
  valid_iters: 32
  depth_min_mm: 1
  depth_max_mm: 3000
  # Post-processing (RealSense-style spatial filter + hole filling)
  spatial_kernel: 5        # median filter kernel size (odd, 3 or 5)
  spatial_iters: 2         # number of spatial filter passes
  hole_fill_mode: farthest # left | farthest | nearest
  hole_fill_max_radius: 2  # max fill distance in px (0 to disable)

hydra:
  output_subdir: null

  run:
    dir: .
