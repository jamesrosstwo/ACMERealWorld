# @package _group_
instruction: "Pick up the stuffed animal and place it in the box"

home_pos: [0.30582778, 0., 0.48467681]
home_rot: [1., 0., 0., 0.]

pos_mask: [true, true, true]

freeze_rotation: false
freeze_gripper: false
zero_gripper_obs: false  # Zero out gripper obs (matches old collection data)
open_gripper_on_reset: true
gripper_hysteresis: 0.1  # Dead zone: grasp if > 0.5+h, open if < 0.5-h
gripper_logging: false

controller: cartesian

max_episode_timesteps: 400

impedance:
  # Original panda_py CartesianImpedance defaults, converted to explici0t gains.
  translational_stiffness: [550, 550, 550]       # N/m
  rotational_stiffness: [60, 60, 60]             # Nm/rad
  translational_damping: [40, 40, 40]            # N·s/m    (2*sqrt(400) = 40)
  rotational_damping: [8, 8, 8]      #'' Nm·s/rad (2*sqrt(60) ≈ 15.49)
  nullspace_stiffness: [15, 5, 10, 10, 10, 5, 5]  # Nm/rad
  nullspace_damping: [7.75, 7.75, 7.75, 7.75, 7.75, 7.75, 7.75]  # Nm·s/rad (2*sqrt(15) ≈ 7.75)