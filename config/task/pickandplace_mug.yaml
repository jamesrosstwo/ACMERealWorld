# @package _group_
defaults:
  - default

instruction: "Pick up the object and place it at the target location"

home_pos: [0.30582778, 0., 0.48467681]
home_rot: [1., 0., 0., 0.]

pos_mask: [true, true, true]

max_episode_timesteps: 250

impedance:
  # Original panda_py CartesianImpedance defaults, converted to explicit gains.
  # (Previously: stiffness + damping_ratio=1.0, Kd = 2*sqrt(Kp) element-wise)
  translational_stiffness: [400, 400, 400]       # N/m
  rotational_stiffness: [60, 60, 60]             # Nm/rad
  translational_damping: [40, 40, 40]            # N·s/m    (2*sqrt(400) = 40)
  rotational_damping: [15.49, 15.49, 15.49]      # Nm·s/rad (2*sqrt(60) ≈ 15.49)
  nullspace_stiffness: [15, 15, 15, 15, 15, 15, 15]  # Nm/rad
  nullspace_damping: [7.75, 7.75, 7.75, 7.75, 7.75, 7.75, 7.75]  # Nm·s/rad (2*sqrt(15) ≈ 7.75)
