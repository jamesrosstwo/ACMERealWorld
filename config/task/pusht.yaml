# @package _group_
instruction: "Push the green T shape into the black outline of the T shape on the table"

home_pos: [0.425, -0.375, 0.38]
home_rot: [1., 0., 0., 0.]

# Per-axis position mask: true = free (policy controls), false = frozen to home.
# Frozen dims are zeroed in observations and replaced with home values in commands.
pos_mask: [true, true, false]   # xy free, z locked to table height

max_episode_timesteps: 250
gripper_hysteresis: 0.1

freeze_rotation: true
freeze_gripper: true

impedance:
  # Polymetis franka_hardware.yaml defaults (exact match).
  translational_stiffness: [750, 750, 750]  # N/m
  rotational_stiffness: [60, 60, 60]        # Nm/rad (increased for freeze_rotation)
  translational_damping: [50, 50, 50]       # N·s/m
  rotational_damping: [15, 15, 15]          # Nm·s/rad (increased for freeze_rotation)
  nullspace_stiffness: [40, 30, 50, 25, 35, 25, 10]  # Nm/rad (Kq)
  nullspace_damping: [4, 6, 5, 5, 3, 2, 1]            # Nm·s/rad (Kqd)
